{% extends "base.html" %}

{% block content %}
<section class="page-head">
  <p class="eyebrow">Image intake</p>
  <h1>Upload a shop banner</h1>
  <p class="lede">Send one storefront image for extraction, then review the fields before saving.</p>
</section>

<section class="workspace">
  <form class="upload-form" action="{{ url_for('analyze_image') }}" method="post" enctype="multipart/form-data">
    <label class="field">
      <span>Shop banner image</span>
      <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp" required>
    </label>

    <div class="preview-box">
      <img id="imagePreview" src="" alt="Selected shop banner preview" hidden>
      <p id="previewPlaceholder">No image selected</p>
    </div>

    <button type="submit">Analyze Image</button>
  </form>
</section>

<script>
  const imageInput = document.getElementById("imageInput");
  const imagePreview = document.getElementById("imagePreview");
  const previewPlaceholder = document.getElementById("previewPlaceholder");

  imageInput.addEventListener("change", () => {
    const [file] = imageInput.files;
    if (!file) {
      imagePreview.hidden = true;
      imagePreview.src = "";
      previewPlaceholder.hidden = false;
      return;
    }

    imagePreview.src = URL.createObjectURL(file);
    imagePreview.hidden = false;
    previewPlaceholder.hidden = true;
  });
</script>
{% endblock %}
